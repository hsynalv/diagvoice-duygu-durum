# Konteyner içi inference — egitim pipeline'i ile uyumlu ayarlar.
random_seed: 42

audio_features:
  target_sr: 16000
  top_db: 35.0
  hop_length: 512
  praat_voice: true
  opensmile_egemaps: true

text_embeddings:
  enabled: false
  model: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
  batch_size: 16
